openapi: 3.1.0
info:
    title: My Sample API
    description: A brief description of what this API does.
    version: 1.0.0

servers:
    - url: http://localhost:5000
      description: Production server

tags:
    - name: public
      description: Public resource all users can access
    - name: auth
      description: Login users
    - name: users | admin
      description: User administration(admin only)
    - name: users | management
      description: Employee management for managers
    - name: services
      description: For managing services
    - name: customers
      description: For managing customers

paths:
    /auth/login:
        post:
            tags:
                - auth
                - public
            summary: Login
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/auth"

            responses:
                "200":
                    description: Sucess
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: "#/components/schemas/SuccessResponse"
                                    - type: object
                                      properties:
                                          data:
                                              type: object
                                              properties:
                                                  user:
                                                      type: object
                                                      properties:
                                                          user_id:
                                                              type: string
                                                              description: uuid v7 string
                                                          user_name:
                                                              type: string
                                                  token:
                                                      type: string
                                                      description: JWT token
                            examples:
                                Success:
                                    summary: Success
                                    value:
                                        success: true
                                        data:
                                            user:
                                                user_id: "019c3d39-2d5a-7b84-9994-9ca7d1ec6db7"
                                                user_name: "admin"
                                                user_role: admin
                                            token: "eyJhbG...b4RjLSrk"
                "401":
                    description: "Unauthorized" # Must redefine description
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                            example:
                                success: false
                                message: "Invalid credentials"
                "422":
                    $ref: "#/components/responses/UnprocessableSyntax"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/users:
        get:
            tags:
                - users | admin
            summary: Get all users (admin only)
            description: |
                Retrieves a list of users sorted by name. You can filter by phone number or name.
                Note: If both are provided, the API prioritizes filtering by phone number. 
                If none are provided, return all users. When filtering by phone number will sort result with it.
            parameters:
                - name: user_phone
                  in: query
                  description: Filter by phone number (prefix match).
                  required: false
                  schema:
                      type: string
                      example: "09"
                - name: user_name
                  in: query
                  description: Filter by name (case-insensitive, unaccented search).
                  required: false
                  schema:
                      type: string
                      example: "Nguyen"
                - $ref: "#/components/parameters/Limit"
                - $ref: "#/components/parameters/NextPage"

            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: "#/components/schemas/SuccessResponse"
                                    - type: object
                                      properties:
                                          data:
                                              type: object
                                              properties:
                                                  results:
                                                      type: array
                                                      items:
                                                          $ref: "#/components/schemas/user"
                                                  next_page:
                                                      type: string
                            examples:
                                success:
                                    summary: Success
                                    value:
                                        success: true
                                        data:
                                            results:
                                                [
                                                    {
                                                        "user_id": "019cbeaa-5df2-7978-a74a-75df12a341b2",
                                                        "user_name": "Lê Hoàng C",
                                                        "user_role": "employee",
                                                        "user_phone": "0900000003",
                                                        "user_status": "active"
                                                    },
                                                    {
                                                        "user_id": "019cbeaa-5ded-77bf-9a79-4cae6e050652",
                                                        "user_name": "Nguyễn Văn A",
                                                        "user_role": "admin",
                                                        "user_phone": "0900000001",
                                                        "user_status": "active"
                                                    }
                                                ]
                                            next_page: "Tmd1eeG7hW4gVsSDbiBBfDAxOWNiZWFhLTVkZWQtNzdiZi05YTc5LTRjYWU2ZTA1MDY1Mg=="
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "422":
                    $ref: "#/components/responses/UnprocessableSyntax"
                "500":
                    $ref: "#/components/responses/InternalError"
        post:
            tags:
                - users | admin
            summary: Create a new user with no restriction(admin only)
            parameters: 
                - $ref: "#/components/parameters/IdempotencyKey"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                user_name:
                                    type: string
                                    description: name of the user
                                user_role:
                                    $ref: "#/components/schemas/user_role_enum"
                                user_phone:
                                    type: string
                                    description: phone number of the user
                                password:
                                    type: string
                                    description: password of the user
            responses:
                "201":
                    description: Created
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: "#/components/schemas/SuccessResponse"
                                    - type: object
                                      properties:
                                          data:
                                              $ref: "#/components/schemas/user"
                            examples:
                                success:
                                    summary: Success
                                    value:
                                        success: true
                                        data:
                                            user_id: "019c3ba7-7c39-7ae4-b1a3-a08f58f70a6f"
                                            user_name: "Lê Văn C"
                                            user_phone: "0901234569"
                                            user_role: "manager"
                                            user_status: "active"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                '409':
                    $ref: '#/components/responses/IdempotencyConflict'
                "422":
                    $ref: "#/components/responses/UnprocessableSyntax"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/users/{id}:
        patch:
            tags:
                - users | admin
            summary: Update everything about an user (admin only)
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                      description: uuid v7 string
                      example: 019c37c3-430d-7de8-9295-4540b874d9b8
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                user_name:
                                    type: string
                                    description: name of the user
                                user_role:
                                    $ref: "#/components/schemas/user_role_enum"
                                user_phone:
                                    type: string
                                    description: phone number of the user
                                password:
                                    type: string
                                    description: password of the user
                                user_status:
                                    $ref: "#/components/schemas/user_status_enum"
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: "#/components/schemas/SuccessResponse"
                                    - type: object
                                      properties:
                                          data:
                                              $ref: "#/components/schemas/user"
                            examples:
                                success:
                                    summary: Success
                                    value:
                                        success: true
                                        data:
                                            user_id: "019c3ba7-7c39-7ae4-b1a3-a08f58f70a6f"
                                            user_name: "Lê Văn C"
                                            user_phone: "0901234569"
                                            user_role: "manager"
                                            user_status: "active"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    description: User not found or already deleted
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                            examples:
                                no_user:
                                    summary: User not found
                                    value:
                                        success: false
                                        message: User not found
                "422":
                    $ref: "#/components/responses/UnprocessableSyntax"
                "500":
                    $ref: "#/components/responses/InternalError"
        delete:
            tags:
                - users | admin
            summary: Soft-delete an user (admin only)
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                      description: uuid v7 string
                      example: 019c37c3-430d-7de8-9295-4540b874d9b8
            responses:
                "204":
                    $ref: "#/components/responses/NoContent"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    description: User not found or already deleted
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                            examples:
                                no_user:
                                    summary: User not found
                                    value:
                                        success: false
                                        message: User not found
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/users/employees:
        get:
            tags:
                - users | management
            summary: Get all employees
            description: |
                Retrieves a list of employees. You can filter by phone number or name. 
                Note: If both are provided, the API prioritizes filtering by phone number. 
                If none are provided, return all employees. When filtering by phone number will sort result with it.
            parameters:
                - name: user_phone
                  in: query
                  description: Filter by employee phone number (prefix match).
                  required: false
                  schema:
                      type: string
                      example: "09"
                - name: user_name
                  in: query
                  description: Filter by employee name (case-insensitive, unaccented search).
                  required: false
                  schema:
                      type: string
                      example: "Nguyen"
                - name: limit
                  in: query
                  description: Limit the number of results per page.
                  required: false
                  schema:
                      type: integer
                      example: 2
                - name: next_page
                  in: query
                  description: Get the starting page of results. Base64 encoded string.
                  required: false
                  schema:
                      type: string
                      example: Tmd1eeG7hW4gVsSDbiBBfDAxOWNiZWFhLTVkZWQtNzdiZi05YTc5LTRjYWU2ZTA1MDY1Mg==
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: "#/components/schemas/SuccessResponse"
                                    - type: object
                                      properties:
                                          data:
                                              type: array
                                              items:
                                                  $ref: "#/components/schemas/user"
                            examples:
                                success:
                                    summary: Success
                                    value:
                                        success: true
                                        data:
                                            - user_id: "019c3ba7-7c39-7ae4-b1a3-a08f58f70a6f"
                                              user_name: "Nguyễn Văn A"
                                              user_phone: "0901234567"
                                              user_role: "employee"
                                              user_status: "active"
                                            - user_id: "019c3ba7-7c39-74fb-8f36-18fd9e6f48ec"
                                              user_name: "Trần Thị B"
                                              user_phone: "0912345678"
                                              user_role: "employee"
                                              user_status: "active"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "500":
                    $ref: "#/components/responses/InternalError"
        post:
            tags:
                - users | management
            summary: Create a new employee (management only)
            parameters: 
                - $ref: "#/components/parameters/IdempotencyKey"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                user_name:
                                    type: string
                                    description: name of the user
                                user_phone:
                                    type: string
                                    description: phone number of the user
                                password:
                                    type: string
                                    description: password of the user
            responses:
                "201":
                    description: |
                      Created successfully.
                      Note: If the Idempotency-Key is reused, this returns the cached response.
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: "#/components/schemas/SuccessResponse"
                                    - type: object
                                      properties:
                                          data:
                                              $ref: "#/components/schemas/user"
                            examples:
                                success:
                                    summary: Success
                                    value:
                                        success: true
                                        data:
                                            user_name: "Nguyễn Văn A"
                                            user_phone: "0901234567"
                                            user_status: active
                                            user_role: employee
                "400":
                    $ref: "#/components/responses/MissingIdempotencyKey"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                '409':
                    $ref: '#/components/responses/IdempotencyConflict'
                '422':
                    description: Unprocessable Entity(Validation or Idempotency issue)
                    content:
                        application/json:
                            schema:
                                oneOf:
                                  - $ref: "#/components/schemas/UnprocessableSyntax"
                                  - $ref: "#/components/schemas/IdempotencyHashMismatch"
                            examples:
                                syntax_error:
                                    summary: Syntax error
                                    value:
                                        success: false
                                        message: "The request cannot be fulfilled due to bad syntax."
                                        error:
                                            [
                                              {
                                                "type": "string",
                                                "value": "string",
                                                "msg": "string",
                                                "path": "string",
                                                "location": "string"
                                              }
                                            ]
                                idempotency_error:
                                    summary: Idempotency error
                                    value:
                                        success: false
                                        message: "This key was previously used with a different request body."
                                        error: "Idempotency Key reuse error"
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/users/employees/{id}:
        patch:
            tags:
                - users | management
            summary: Update an employee
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                      description: uuid v7 string
                      example: 019c37c3-430d-7de8-9295-4540b874d9b8
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                user_name:
                                    type: string
                                    description: name of the user
                                    example: "Phạm Minh D"
                                user_phone:
                                    type: string
                                    description: phone number of the user
                                    example: "0900000004"
                                user_status:
                                    $ref: "#/components/schemas/user_status_enum"
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: "#/components/schemas/SuccessResponse"
                                    - type: object
                                      properties:
                                          data:
                                              $ref: "#/components/schemas/user"

                "400":
                    description: Bad request
                    content:
                        application/json:
                            schema:
                                oneOf:
                                    - $ref: "#/components/schemas/UnprocessableSyntax"
                                    - $ref: "#/components/schemas/ErrorResponse"
                            examples:
                                bad_syntax:
                                    summary: Bad request syntax
                                    value:
                                        success: false
                                        message: "The request cannot be fulfilled due to bad syntax"
                                        error:
                                            [
                                                {
                                                    type: "field",
                                                    value: "a",
                                                    msg: "Invalid phone number",
                                                    path: "user_phone",
                                                    location: "body",
                                                },
                                            ]
                                no_fields:
                                    summary: No fields to update
                                    value:
                                        success: false
                                        message: "No fields to update"

                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    description: Employee not found
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                            examples:
                                no_user:
                                    summary: Employee not found
                                    value:
                                        success: false
                                        message: User not found or deleted
                "500":
                    $ref: "#/components/responses/InternalError"
        delete:
            tags:
                - users | management
            summary: Soft-delete an employee
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                      description: uuid v7 string
                      example: 019c37c3-430d-7de8-9295-4540b874d9b8
            responses:
                "204":
                    $ref: "#/components/responses/NoContent"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    description: User not found or already deleted
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                            examples:
                                no_user:
                                    summary: User not found
                                    value:
                                        success: false
                                        message: User not found or already deleted
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/users/self:
        get:
            tags:
                - public
            summary: Get current own user info
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: "#/components/schemas/SuccessResponse"
                                    - type: object
                                      properties:
                                          data:
                                              $ref: "#/components/schemas/user"
                "404":
                    description: User not found
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ErrorResponse"
                            examples:
                                no_user:
                                    summary: User not found
                                    value:
                                        success: false
                                        message: User not found
                "500":
                    $ref: "#/components/responses/InternalError"
    /api/services:
        get:
            tags:
                - public
                - services
            summary: Get all services
            parameters:
                - name: service_name
                  in: query
                  description: Filter by service name (case-insensitive, unaccented search).
                  required: false
                  schema:
                      type: string
                      example: "Giat"
                - $ref: "#/components/parameters/Limit"
                - $ref: "#/components/parameters/NextPage"
            responses:
                "200":
                    description: Success
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: "#/components/schemas/SuccessResponse"
                                    - type: object
                                      properties:
                                          data:
                                              type: array
                                              items:
                                                  $ref: "#/components/schemas/service"
                            examples:
                                all_services:
                                    summary: Success
                                    value:
                                        success: true
                                        data:
                                            - service_id: "019c37c3-4300-7fa6-9dd9-e274ee18d683"
                                              service_name: "Cotton Áo khoác (Giặt khô)"
                                              service_unit: "cái"
                                              service_price_per_unit: 105
                                            - service_id: "019c37c3-4302-770a-ac89-b5d0683061fa"
                                              service_name: "Cotton Áo khoác (Giặt tay)"
                                              service_unit: "cái"
                                              service_price_per_unit: 95
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "500":
                    $ref: "#/components/responses/InternalError"
        post:
            tags:
                - services
            summary: Create a new service
            parameters: 
                - $ref: "#/components/parameters/IdempotencyKey"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                service_name:
                                    type: string
                                    description: name of the service
                                    example: "Cotton Áo khoác (Giặt khô)"
                                service_unit:
                                    type: string
                                    description: unit of the service
                                    example: "cái"
                                service_price_per_unit:
                                    type: number
                                    description: price per unit of the service
                                    example: 105
            responses:
                "201":
                    description: Created
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/SuccessResponse"
                            examples:
                                success:
                                    summary: Success
                                    value:
                                        success: true
                                        data:
                                            service_id: "019c37c3-4300-7fa6-9dd9-e274ee18d683"
                                            service_name: "Cotton Áo khoác (Giặt khô)"
                                            service_unit: "cái"
                                            service_price_per_unit: 105
                "400":
                    $ref: "#/components/responses/UnprocessableSyntax"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "500":
                    $ref: "#/components/responses/InternalError"
