                                allOf:
                                    - $ref: "#/components/schemas/SuccessResponse"
                                    - type: object
                                      properties:
                                          data:
                                              $ref: "#/components/schemas/service"
                            examples:
                                success:
                                    summary: Success
                                    value:
                                        success: true
                                        data:
                                            service_id: "019c37c3-4302-770a-ac89-b5d0683061fa"
                                            service_name: "Cotton Áo khoác (Giặt khô)"
                                            service_unit: "cái"
                                            service_price_per_unit: 105
                "400":
                    description: Bad request
                    content:
                        application/json:
                            schema:
                                oneOf:
                                    - $ref: "#/components/schemas/UnprocessableSyntax"
                                    - $ref: "#/components/schemas/ErrorResponse"
                            examples:
                                bad_syntax:
                                    summary: Bad request syntax
                                    value:
                                        success: false
                                        message: "The request cannot be fulfilled due to bad syntax"
                                        error:
                                            [
                                                {
                                                    type: "field",
                                                    value: "a",
