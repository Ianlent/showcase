services:
    db:
        image: postgres:18-alpine
        container_name: crm_db
        environment:
            POSTGRES_USER: ${DB_USER:-postgres}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
            POSTGRES_DB: ${DB_NAME:-crm_db}
        ports:
            - "5432:5432"
        volumes:
            - ./backend/postgresForSetup/pos.sql:/docker-entrypoint-initdb.d/01-schema.sql
            - ./backend/postgresForSetup/mockdata.sql:/docker-entrypoint-initdb.d/02-mockdata.sql
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-crm_db}",
                ]
            interval: 2s
            timeout: 5s
            retries: 10
    backend:
        build: ./backend
        container_name: crm_backend
        environment:
            - DB_HOST=db
            - DB_PORT=5432
            - DB_USER=${DB_USER:-postgres}
            - DB_PASSWORD=${DB_PASSWORD:-password123}
            - DB_NAME=${DB_NAME:-crm_db}
            - JWT_SECRET=${JWT_SECRET:-my_demo_secret}
            - TZ=UTC
            - APP_PORT=5000
            - DOCS_PORT=8080
            - NODE_ENV=development
            - MAGNIFICATION_FACTOR=1000
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - ./backend:/app
            - /app/node_modules
        ports:
            - "5000:5000"
            - "8080:8080" # Docs port

    frontend:
        build: ./frontend
        container_name: crm_frontend
        environment:
            - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:5000}
        ports:
            - "3000:3000"
        depends_on:
            - backend
